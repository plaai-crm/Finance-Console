<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Console · ระบบบริหารการเงินกลุ่มธุรกิจ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#e9ebf0; --panel:#ffffff; --ink:#111b33; --muted:#616b81; --faint:#949db1;
    --line:#e6e8ef; --line-strong:#d2d7e1;
    --navy:#152341; --navy-2:#22345c; --navy-soft:#e8ecf6;
    --sidebar:#0b1424; --sidebar-2:#152340; --sidebar-line:#25344f; --sidebar-mut:#8f9db9;
    --gold:#b18f4e; --gold-2:#d4b878; --gold-soft:#f2ecdd;
    --emer:#0d6f4c; --emer-soft:#e6f1eb;
    --red:#b23a2f; --red-soft:#f8eae8;
    --amber:#a86f1c; --amber-soft:#faf1de; --amber-line:#ecd6a2;
    --shadow:0 1px 2px rgba(17,27,51,.04),0 14px 34px -12px rgba(17,27,51,.14);
    --shadow-lg:0 1px 3px rgba(17,27,51,.05),0 24px 50px -16px rgba(17,27,51,.22);
    --radius:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Sarabun',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:15.5px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
  h1,h2,h3,h4{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:1rem;padding:12px 14px;border:1px solid var(--line-strong);border-radius:9px;width:100%;background:#fff;color:var(--ink);transition:border-color .18s,box-shadow .18s}
  textarea{min-height:84px;resize:vertical;line-height:1.5}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
  label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin:0 0 6px;letter-spacing:.01em}
  .hidden{display:none!important}
  .serif{font-family:'Cormorant Garamond',serif;letter-spacing:.005em}
  .mono-num{font-variant-numeric:tabular-nums}
  ::selection{background:var(--gold-soft)}

  /* ---------------- LOGIN ---------------- */
  #login{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr}
  .login-brand{background:linear-gradient(155deg,#0b1424 0%,#152640 55%,#1d3155 100%);color:#fff;padding:60px 56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .login-brand::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 15% 100%,rgba(177,143,78,.10),transparent 60%);pointer-events:none}
  .login-brand::after{content:"";position:absolute;right:-140px;top:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(212,184,120,.14),transparent 70%)}
  .login-brand>*{position:relative;z-index:1}
  .monogram{width:62px;height:62px;border:1px solid var(--gold);border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold-2);font-weight:700;box-shadow:inset 0 0 0 1px rgba(212,184,120,.18)}
  .login-brand h1{font-family:'Cormorant Garamond',serif;font-size:2.85rem;font-weight:600;line-height:1.12;margin-top:28px;letter-spacing:.005em}
  .login-brand .tag{color:#b9c4da;margin-top:16px;max-width:370px;font-weight:300;font-size:1.03rem;line-height:1.7}
  .brand-foot{color:#6d7a90;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase}
  .login-form-wrap{display:flex;align-items:center;justify-content:center;padding:40px 32px;background:var(--panel)}
  .login-form{width:100%;max-width:384px}
  .login-form .eyebrow{font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .login-form h2{font-family:'Cormorant Garamond',serif;font-size:2rem;margin:10px 0 4px;font-weight:600;letter-spacing:.005em}
  .login-form p{color:var(--muted);margin:0 0 28px;font-size:.95rem}
  .field{margin-bottom:16px}
  .login-error{background:var(--red-soft);color:var(--red);border:1px solid #ecc9c4;border-radius:9px;padding:10px 14px;font-size:.9rem;margin-bottom:16px}
  .btn-primary{background:var(--navy);color:#fff;padding:15px 18px;border-radius:10px;font-weight:600;font-size:1rem;width:100%;letter-spacing:.03em;transition:transform .06s,background .18s,box-shadow .18s;box-shadow:0 8px 20px -8px rgba(21,35,65,.5)}
  .btn-primary:hover{background:var(--navy-2);box-shadow:0 12px 26px -8px rgba(21,35,65,.55)}.btn-primary:active{transform:translateY(1px)}
  .login-hint{margin-top:24px;padding-top:20px;border-top:1px solid var(--line);font-size:.82rem;color:var(--faint);line-height:1.7}

  /* ---------------- SHELL ---------------- */
  .shell{display:flex;min-height:100vh}
  aside.sidebar{width:258px;background:linear-gradient(180deg,#0b1424 0%,#0d1729 100%);color:#fff;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;padding:24px 16px;z-index:30;border-right:1px solid #1a2740}
  .side-brand{display:flex;align-items:center;gap:12px;padding:4px 8px 20px;border-bottom:1px solid var(--sidebar-line)}
  .side-brand .mg{width:42px;height:42px;border:1px solid var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-2);font-weight:700;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(212,184,120,.15)}
  .side-brand .nm{font-family:'Cormorant Garamond',serif;font-size:1.34rem;font-weight:600;line-height:1.1}
  .side-brand .sb{font-size:.66rem;color:var(--sidebar-mut);letter-spacing:.16em;text-transform:uppercase;margin-top:2px}
  nav.side-nav{margin-top:18px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;color:var(--sidebar-mut);font-weight:500;font-size:.96rem;transition:background .18s,color .18s;text-align:left;width:100%}
  .nav-item svg{width:19px;height:19px;flex:0 0 auto;stroke-width:1.6}
  .nav-item:hover{background:rgba(255,255,255,.04);color:#e9edf3}
  .nav-item.active{background:var(--sidebar-2);color:#fff;position:relative}
  .nav-item.active svg{color:var(--gold-2)}
  .nav-item.active::before{content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--gold)}
  .side-user{border-top:1px solid var(--sidebar-line);padding-top:14px;margin-top:8px}
  .side-user .u-row{display:flex;align-items:center;gap:11px}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a5823f);color:#1a130a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.98rem;flex:0 0 auto}
  .side-user .nm{font-weight:600;font-size:.92rem;color:#eef1f5;line-height:1.2}
  .side-user .rl{font-size:.74rem;color:var(--sidebar-mut)}
  .btn-signout{margin-top:12px;width:100%;padding:10px;border:1px solid var(--sidebar-line);border-radius:9px;color:var(--sidebar-mut);font-size:.86rem;font-weight:500;transition:.15s;cursor:pointer}
  .btn-signout:hover{background:var(--sidebar-2);color:#fff}

  main.content{margin-left:256px;flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:18px 34px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:20}
  .topbar .pg-title{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:600;letter-spacing:.005em;line-height:1.1}
  .topbar .pg-sub{font-size:.83rem;color:var(--muted);margin-top:2px}
  .topbar .clock{text-align:right;font-size:.84rem;color:var(--muted);line-height:1.4}
  .topbar .clock b{color:var(--ink);font-weight:600}
  .page{padding:28px 32px 60px;max-width:1180px;width:100%}

  /* ---------------- COMPONENTS ---------------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 26px;margin-bottom:22px}
  .card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .card-h h2{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;letter-spacing:.005em}
  .card-h .hint{font-size:.82rem;color:var(--muted)}
  .section-eyebrow{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px}

  .btn{padding:11px 17px;border-radius:9px;font-weight:600;font-size:.92rem;transition:.18s;display:inline-flex;align-items:center;gap:8px;justify-content:center;letter-spacing:.01em}
  .btn svg{width:17px;height:17px;stroke-width:2}
  .btn-dark{background:var(--navy);color:#fff;box-shadow:0 8px 18px -10px rgba(21,35,65,.55)}.btn-dark:hover{background:var(--navy-2)}
  .btn-gold{background:linear-gradient(180deg,#c3a563,#b18f4e);color:#231a08;box-shadow:0 8px 18px -10px rgba(177,143,78,.6)}.btn-gold:hover{background:linear-gradient(180deg,#d0b370,#bd9a55)}
  .btn-ghost{background:#f1f2f6;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{background:#e8eaf0}
  .btn-danger{background:var(--red-soft);color:var(--red);border:1px solid #ecc9c4}.btn-danger:hover{background:#f4dad6}
  .btn-sm{padding:7px 12px;font-size:.82rem;border-radius:8px}
  .btn-block{width:100%}
  .row{display:flex;gap:12px}.row>*{flex:1}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;position:relative;overflow:hidden}
  .kpi .k{font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .kpi .v{font-size:1.72rem;font-weight:700;margin-top:9px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .kpi .u{font-size:.9rem;color:var(--faint);font-weight:500}
  .kpi.pos .v{color:var(--emer)} .kpi.neg .v{color:var(--red)}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px}
  .kpi.pos .bar{background:var(--emer)} .kpi.neg .bar{background:var(--red)} .kpi.gold .bar{background:linear-gradient(180deg,#d4b878,#b18f4e)} .kpi.ink .bar{background:var(--navy)}

  .table{width:100%;border-collapse:collapse}
  .table th{text-align:left;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 12px 10px;border-bottom:1px solid var(--line)}
  .table td{padding:14px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  .table tr:last-child td{border-bottom:none}
  .table tr:hover td{background:#fafbfc}
  .t-title{font-weight:600}
  .t-sub{font-size:.82rem;color:var(--muted)}
  .num{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap;text-align:right}
  .num.pos{color:var(--emer)} .num.neg{color:var(--red)}

  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:.76rem;font-weight:600;line-height:1.5}
  .c-in{background:var(--emer-soft);color:var(--emer)}
  .c-out{background:var(--red-soft);color:var(--red)}
  .c-monthly{background:#eceffb;color:#3b4aa0}
  .c-once{background:#f0f2f5;color:var(--muted)}
  .c-paid{background:var(--emer-soft);color:var(--emer)}
  .c-unpaid{background:var(--amber-soft);color:var(--amber)}
  .c-neutral{background:#eef0f4;color:var(--muted)}
  .c-auto{background:#eef0f4;color:var(--navy)}

  .check{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line-strong);background:#fff;display:inline-flex;align-items:center;justify-content:center;transition:.15s;flex:0 0 auto;cursor:pointer}
  .check svg{width:15px;height:15px;stroke-width:2.5;opacity:0}
  .check.done{background:var(--emer);border-color:var(--emer)}
  .check.done svg{opacity:1;stroke:#fff}
  .check:hover{border-color:var(--emer)}

  .reminder{display:flex;align-items:center;gap:16px;padding:15px 18px;border:1px solid var(--amber-line);background:linear-gradient(90deg,var(--amber-soft),#fff 90%);border-left:3px solid var(--amber);border-radius:11px;margin-bottom:10px}
  .reminder .rm-main{flex:1;min-width:0}
  .reminder .rm-title{font-weight:600}
  .reminder .rm-meta{font-size:.84rem;color:var(--muted)}
  .reminder .rm-when{font-size:.8rem;font-weight:700;color:var(--amber);white-space:nowrap}
  .reminder .rm-when.late{color:var(--red)}

  .empty{text-align:center;color:var(--faint);padding:34px 12px}
  .empty svg{width:36px;height:36px;stroke-width:1.5;opacity:.5;margin-bottom:8px}

  .biz-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .biz-row:last-child{border-bottom:none}

  .seg{display:inline-flex;background:#eef0f4;border-radius:10px;padding:4px;gap:4px;width:100%}
  .seg button{flex:1;padding:10px 14px;border-radius:7px;font-weight:600;color:var(--muted);font-size:.9rem;transition:.15s}
  .seg button.sel{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
  .pchip{background:#f2f3f6;border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:.85rem;font-weight:500;color:var(--ink);transition:.15s}
  .pchip.sel{background:var(--navy);color:#fff;border-color:var(--navy)}

  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .filters>div{flex:1;min-width:140px}

  .modal-bg{position:fixed;inset:0;background:rgba(14,19,27,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60;animation:fade .15s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:92vh;overflow:auto;box-shadow:var(--shadow-lg);border-top:3px solid var(--gold)}
  .modal-head{padding:22px 24px 0}
  .modal-head h3{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:600;letter-spacing:.005em}
  .modal-head p{color:var(--muted);font-size:.88rem;margin:4px 0 0}
  .modal-body{padding:18px 24px}
  .modal-foot{padding:16px 24px 22px;display:flex;gap:12px}
  .modal-foot .btn{flex:1}
  .fld{margin-bottom:14px}
  .field-help{font-size:.8rem;color:var(--faint);margin-top:6px}
  .divider{height:1px;background:var(--line);margin:16px 0}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-weight:500;z-index:80;box-shadow:0 12px 30px rgba(0,0,0,.25);display:flex;align-items:center;gap:9px}
  .toast svg{width:18px;height:18px;stroke:var(--gold-2)}

  .badge-mode{font-size:.74rem;padding:4px 11px;border-radius:999px;font-weight:600}
  .badge-cloud{background:var(--emer-soft);color:var(--emer)}
  .badge-local{background:var(--amber-soft);color:var(--amber)}

  /* charts + docs */
  .legend{display:flex;gap:18px;font-size:.82rem;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .barchart{display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:6px}
  .barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;min-width:0}
  .barpair{display:flex;gap:4px;align-items:flex-end;height:100%;width:100%;justify-content:center}
  .bar{width:16px;border-radius:5px 5px 0 0;background:var(--navy);min-height:2px;transition:height .3s}
  .bar.exp{background:var(--red)}
  .barlabel{font-size:.72rem;color:var(--muted);white-space:nowrap;text-align:center}
  .updated{font-size:.78rem;color:var(--faint);margin:-8px 0 16px}

  .uploader{border:1.5px dashed var(--line-strong);border-radius:10px;padding:16px;text-align:center;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:500;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .uploader svg{width:18px;height:18px}
  .uploader:hover{border-color:var(--navy);background:var(--navy-soft);color:var(--navy)}
  .filechip{display:inline-flex;align-items:center;gap:8px;background:var(--navy-soft);color:var(--navy);border-radius:8px;padding:8px 12px;font-size:.85rem;font-weight:600;margin-top:8px}
  .filechip svg{width:16px;height:16px;flex:0 0 auto}
  .doc-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .doc-row:last-child{border-bottom:none}
  .doc-ic{width:42px;height:42px;border-radius:10px;background:var(--navy-soft);color:var(--navy);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .doc-ic svg{width:20px;height:20px}
  .rate-badge{background:var(--gold-soft);color:#87641c;border-radius:8px;padding:3px 11px;font-weight:700;font-size:.82rem;white-space:nowrap}
  .link-open{color:var(--navy);font-weight:600;font-size:.85rem;text-decoration:none;white-space:nowrap}
  .link-open:hover{text-decoration:underline}

  /* lending / investment / guarantee */
  .c-loan{background:#eceffb;color:#3b4aa0}
  .c-invest{background:var(--gold-soft);color:#87641c}
  .c-secured{background:var(--emer-soft);color:var(--emer)}
  .c-unsec{background:var(--amber-soft);color:var(--amber)}
  .c-ext{background:#f3ecfb;color:#6b3fa0}
  .c-affil{background:#eef0f4;color:var(--muted)}
  .c-over{background:var(--red-soft);color:var(--red)}
  .c-closed{background:#eef0f4;color:var(--muted)}
  .c-active{background:var(--emer-soft);color:var(--emer)}
  .loancard{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px}
  .loancard.over{border-color:#e7b7b0;border-left:3px solid var(--red)}
  .loancard.closed{opacity:.72}
  .lc-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
  .lc-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;letter-spacing:.005em}
  .hl{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:16px 0}
  .dcell{background:#f8f9fb;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .dcell .l{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .dcell .v{font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;font-size:1.02rem}
  .dcell .v.sm{font-size:.9rem}
  .dcell.pos .v{color:var(--emer)} .dcell.neg .v{color:var(--red)} .dcell.gold .v{color:#87641c}
  .prog-wrap{margin:6px 0 2px}
  .prog{height:9px;background:#eef0f4;border-radius:6px;overflow:hidden}
  .prog>span{display:block;height:100%;background:var(--emer);border-radius:6px;transition:width .3s}
  .prog.over>span{background:var(--red)}
  .prog-meta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-top:6px;font-weight:600}
  .lc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .alert-over{display:flex;align-items:center;gap:14px;padding:15px 18px;border:1px solid #e7b7b0;background:linear-gradient(90deg,var(--red-soft),#fff 92%);border-left:3px solid var(--red);border-radius:12px;margin-bottom:12px}
  .alert-over .ao-ic{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid #e7b7b0;color:var(--red);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .alert-over .ao-ic svg{width:20px;height:20px}
  .metric-note{font-size:.82rem;color:var(--muted);line-height:1.7;background:#f8f9fb;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:4px}
  .logline{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .logline:last-child{border-bottom:none}

/* ---------- finance calc helpers ---------- */
function addMonths(iso,n){if(!iso)return null;const p=iso.split('-').map(Number);let y=p[0],m=p[1]-1+Number(n||0),d=p[2];y+=Math.floor(m/12);m=((m%12)+12)%12;const dim=new Date(y,m+1,0).getDate();if(d>dim)d=dim;return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function yearsBetween(a,b){if(!a||!b)return 0;return (new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000/365.25;}
function pct(n){return (n*100).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})+'%';}
// เงินกู้: คำนวณยอดคงค้าง สถานะเกินกำหนด และความคืบหน้าการผ่อน
function loanCalc(l,payments){
  const paid=payments.filter(p=>p.loan_id===l.id).reduce((s,p)=>s+(+p.amount||0),0);
  const principal=+l.principal||0;
  const outstanding=Math.max(0,principal-paid);
  const end=(l.term_months&&l.start_date)?addMonths(l.start_date,+l.term_months):null;
  const isClosed=l.status==='closed'||outstanding<=0.5;
  const overdue=!isClosed && (l.status==='overdue' || (!!end && daysUntil(end)<0));
  const daysLate=end?(-daysUntil(end)):0;
  const yearsElapsed=yearsBetween(l.start_date,todayISO());
  return {paid,principal,outstanding,end,isClosed,overdue,daysLate,yearsElapsed,progress:principal>0?Math.min(1,paid/principal):0};
}
// ประมาณค่างวดผ่อน (เงินต้น + ดอกเบี้ยแบบคงที่ตลอดสัญญา หารเท่ากันทุกงวด)
function estInstallment(principal,ratePct,months){
  principal=+principal||0;months=+months||0;if(!principal||!months)return 0;
  const yrs=months/12;const interest=principal*(+ratePct||0)/100*yrs;
  return Math.round((principal+interest)/months);
}
// การลงทุน: ต้นทุนรวม, ค่าธรรมเนียม%ของเงินต้น, กำไร/ขาดทุน, ผลตอบแทน AM & GM (ต่อปี)
function investCalc(iv){
  const buy=+iv.buy_price||0, fee=+iv.fee||0;
  const cost=buy+fee;
  const cur=+iv.current_value||0;
  const feePct=buy>0?fee/buy:0;
  const gain=cur-cost;
  const totRet=cost>0?gain/cost:0;           // ผลตอบแทนรวม (สัดส่วน)
  const yrs=yearsBetween(iv.buy_date,iv.current_date||todayISO());
  const am=yrs>0?totRet/yrs:totRet;          // เฉลี่ยเลขคณิตต่อปี = ผลตอบแทนรวม ÷ จำนวนปี
  const gm=(yrs>0&&cost>0&&cur>0)?Math.pow(cur/cost,1/yrs)-1:totRet; // เรขาคณิต (ทบต้น) = CAGR
  return {buy,fee,cost,cur,feePct,gain,totRet,yrs,am,gm};
}
// พอร์ตรวม: AM = เฉลี่ยผลตอบแทนรวมของทุกสินทรัพย์, GM = รากที่ n ของผลคูณ (1+ผลตอบแทน)
function portfolioAMGM(list){
  const rows=list.map(investCalc).filter(r=>r.cost>0);
  if(!rows.length)return {am:0,gm:0,n:0};
  const am=rows.reduce((s,r)=>s+r.totRet,0)/rows.length;
  const prod=rows.reduce((s,r)=>s*(1+r.totRet),1);
  const gm=Math.pow(prod,1/rows.length)-1;
  return {am,gm,n:rows.length};
}
// รายได้ค่าค้ำประกัน (ต่อปี)
function guaranteeCalc(g){
  const face=+g.facility_amount||0;
  const annual=g.fee_type==='fixed' ? (+g.fee_amount||0) : face*(+g.fee_rate||0)/100;
  return {face,annual};
}

    if(error){err.textContent='เข้าสู่ระบบไม่สำเร็จ: '+error.message;err.classList.remove('hidden');return;}
    found=data||null;
  }else{
    // โหมดทดลอง (ในเครื่อง): เทียบรหัสผ่านจากข้อมูลในเครื่องเหมือนเดิม
    const users=await Store.list('app_users');
    found=users.find(x=>x.username.toLowerCase()===u.toLowerCase()&&x.password===p&&x.active!==false)||null;
  }
  if(!found){err.textContent='ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';err.classList.remove('hidden');return;}
  err.classList.add('hidden'); App.user=found; $('#lgPass').value='';
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#avatar').textContent=initials(found.name||found.username);
  $('#sideName').textContent=found.name||found.username;
  $('#sideRole').textContent=ROLE_LABEL[found.role]+(found.role==='staff'?' · '+SCOPE_LABEL[found.scope]:'');
  await materializeRecurring();
  buildNav(); go('dash');
  resetIdle(); // เริ่มจับเวลาไม่ใช้งาน 30 นาที
}

/* ---------- recurring materialization ---------- */
async function materializeRecurring(){
  const items=(await Store.list('recurring_items')).filter(i=>i.active!==false);
  if(!items.length) return;
  const tx=await Store.list('transactions');
  const cur=ymOffset(0), nxt=ymOffset(1);
  for(const it of items){
    const months = it.kind==='expense' ? [cur,nxt] : [cur];
    for(const ym of months){
      const exists=tx.some(t=>t.recurring_id===it.id && (t.txn_date||'').slice(0,7)===ym);
      if(exists) continue;
      const [y,m]=ym.split('-').map(Number);
      const day=Math.min(it.pay_day||1, daysInMonth(y,m));
      const date=`${ym}-${String(day).padStart(2,'0')}`;
      const row={recurring_id:it.id,kind:it.kind,business_id:it.business_id,category:it.category,
        amount:+it.amount||0,wht:+it.wht||0,txn_date:date,recurrence:'monthly',
        is_paid:false, paid_date:null,
        note:it.note||'', created_by:'auto'};
      const created=await Store.insert('transactions',row); tx.push(created);
    }
  }
}

function makeUploader(existing){
  let state=existing&&existing.file_data?{file_name:existing.file_name,file_data:existing.file_data}:null;
  const input=el('input',{type:'file',style:'display:none',accept:'.pdf,.jpg,.jpeg,.png,.webp'});
  const box=el('div',{});
  function draw(){box.innerHTML='';box.append(el('div',{class:'uploader',html:svg(I.upload)+'<span>คลิกเพื่อเลือกไฟล์ (PDF/รูปภาพ ไม่เกิน 4MB)</span>',onclick:()=>input.click()}));
    if(state)box.append(el('div',{},el('span',{class:'filechip',html:svg(I.doc)+'<span>'+state.file_name+'</span>'}),el('button',{class:'btn btn-ghost btn-sm',type:'button',style:'margin-left:8px',onclick:()=>{state=null;draw();}},'ลบไฟล์')));}
  input.addEventListener('change',async()=>{const f=input.files[0];if(!f)return;if(f.size>MAX_FILE){toast('ไฟล์ใหญ่เกิน 4MB');input.value='';return;}state={file_name:f.name,file_data:await readFile(f)};draw();});
  draw();
  return {node:el('div',{},input,box),get:()=>state};
}

let LV={sub:'loans'};
async function renderLending(p){
  p.innerHTML='';
  const tabs=[['loans','ปล่อยกู้',I.lend]];
  if(isOwner()){tabs.push(['invest','ลงทุน',I.chart]);tabs.push(['guarantee','รับค้ำประกัน',I.shield]);}

  if(!tabs.some(t=>t[0]===LV.sub))LV.sub='loans';
  const seg=el('div',{class:'seg',style:'margin-bottom:20px;flex-wrap:wrap'});
  tabs.forEach(([v,l,ic])=>seg.append(el('button',{class:LV.sub===v?'sel':'',style:'display:flex;align-items:center;gap:7px',html:svg(ic,'')+'<span>'+l+'</span>',onclick:()=>{LV.sub=v;renderLending(p);}})));

  const loans=await Store.list('affiliate_loans',{col:'start_date',asc:false});
  const payments=await Store.list('loan_payments');
  const calcs=new Map(loans.map(l=>[l.id,loanCalc(l,payments)]));
  const principalTot=loans.reduce((s,l)=>s+(+l.principal||0),0);
  const outTot=loans.reduce((s,l)=>s+calcs.get(l.id).outstanding,0);
  const overdueList=loans.filter(l=>calcs.get(l.id).overdue);

  const hc=el('div',{class:'card'});
  hc.append(el('div',{class:'card-h'},el('div',{},el('div',{class:'section-eyebrow'},'สินเชื่อ / เงินให้กู้'),el('h2',{},'ปล่อยกู้ธุรกิจในเครือ & นอกเครือ')),
    el('button',{class:'btn btn-dark',html:svg(I.plus)+'เพิ่มสัญญากู้',onclick:()=>openAffiliateLoanModal()})));

    kpi('gold','เงินต้นให้กู้รวม',money(principalTot),'฿'),
    kpi(outTot>0?'ink':'pos','ยอดคงค้าง (ยังไม่คืน)',money(outTot),'฿'),
    kpi('ink','จำนวนสัญญา',String(loans.length),''),

  p.append(hc);

  // แจ้งเตือนหนี้เกินกำหนด (Request 6)
  if(overdueList.length){
    const oc=el('div',{class:'card',style:'border-color:#e7b7b0'});
    oc.append(el('div',{class:'card-h'},el('div',{},el('div',{class:'section-eyebrow',style:'color:var(--red)'},'ต้องติดตามด่วน'),el('h2',{},'หนี้ที่เกินกำหนด / ยังไม่คืน'))));

          el('div',{class:'t-title'},l.business_name||'-'),
          el('div',{class:'t-sub'},`คงค้าง ${money(c.outstanding)} บาท`+(c.end?` · ครบกำหนด ${fmtDate(c.end)} (เลย ${c.daysLate} วัน)`:` · ยืมมาแล้ว ${c.yearsElapsed.toFixed(1)} ปี`))),
        el('div',{style:'display:flex;gap:8px;flex-wrap:wrap'},
          el('button',{class:'btn btn-gold btn-sm',onclick:()=>openFollowupModal(l)},'บันทึกการติดตาม'),
          el('button',{class:'btn btn-ghost btn-sm',onclick:()=>openLoanDetail(l)},'รายละเอียด'))));
    });
    p.append(oc);
  }

  if(!loans.length){p.append(el('div',{class:'card'},emptyBox('ยังไม่มีสัญญากู้ — กด “เพิ่มสัญญากู้” เพื่อเริ่ม')));return;}

  const scopeSel=el('select',{});[['all','ทุกธุรกิจ'],['general','ทั่วไป (ยกเว้นโรงแรม)'],['hotel','เฉพาะโรงแรม']].forEach(([v,l])=>{const o=el('option',{value:v},l);if(u.scope===v)o.selected=true;scopeSel.append(o);});

  body.append(el('div',{class:'fld'},el('label',{},'ชื่อ-สกุล / ชื่อเรียก'),name),el('div',{class:'fld'},el('label',{},'ชื่อผู้ใช้ (Username)'),uname),
    el('div',{class:'fld'},el('label',{},existing?'รหัสผ่านใหม่':'รหัสผ่าน'),pass),el('div',{class:'fld'},el('label',{},'บทบาท'),roleSeg),scopeWrap,el('div',{class:'fld'},el('label',{},'สถานะ'),actBtn));
