<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Console · ระบบบริหารการเงินกลุ่มธุรกิจ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef1f6; --panel:#ffffff; --ink:#16223f; --muted:#6b7488; --faint:#98a1b3;
    --line:#e5e8ef; --line-strong:#d3d8e2;
    --navy:#16223f; --navy-2:#243458; --navy-soft:#e9edf7;
    --sidebar:#111c33; --sidebar-2:#1b2947; --sidebar-line:#2a3a5c; --sidebar-mut:#95a3c2;
    --gold:#c2a15a; --gold-2:#d8bd82; --gold-soft:#f4eede;
    --emer:#0f7a53; --emer-soft:#e7f2ec;
    --red:#bb4034; --red-soft:#f9ebe9;
    --amber:#b7791f; --amber-soft:#fbf3e2; --amber-line:#efd9a8;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Sarabun',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:1rem;padding:12px 14px;border:1px solid var(--line-strong);border-radius:10px;width:100%;background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  textarea{min-height:84px;resize:vertical;line-height:1.5}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-soft)}
  label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin:0 0 6px;letter-spacing:.01em}
  .hidden{display:none!important}
  .serif{font-family:'Cormorant Garamond',serif}
  .mono-num{font-variant-numeric:tabular-nums}
  ::selection{background:var(--navy-soft)}

  /* ---------------- LOGIN ---------------- */
  #login{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr}
  .login-brand{background:linear-gradient(160deg,#111c33 0%,#1e2f52 100%);color:#fff;padding:56px 52px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .login-brand::after{content:"";position:absolute;right:-120px;top:-120px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(194,161,90,.16),transparent 70%)}
  .monogram{width:60px;height:60px;border:1.5px solid var(--gold);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:34px;color:var(--gold-2);font-weight:700}
  .login-brand h1{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;line-height:1.15;margin-top:26px;letter-spacing:.01em}
  .login-brand .tag{color:var(--sidebar-mut);margin-top:14px;max-width:360px;font-weight:300;font-size:1.02rem}
  .brand-foot{color:#5f6b7b;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase}
  .login-form-wrap{display:flex;align-items:center;justify-content:center;padding:40px 32px;background:var(--panel)}
  .login-form{width:100%;max-width:380px}
  .login-form .eyebrow{font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .login-form h2{font-size:1.5rem;margin:8px 0 4px;font-weight:700}
  .login-form p{color:var(--muted);margin:0 0 26px;font-size:.95rem}
  .field{margin-bottom:16px}
  .login-error{background:var(--red-soft);color:var(--red);border:1px solid #eecbc6;border-radius:10px;padding:10px 14px;font-size:.9rem;margin-bottom:16px}
  .btn-primary{background:var(--navy);color:#fff;padding:14px 18px;border-radius:11px;font-weight:600;font-size:1rem;width:100%;letter-spacing:.02em;transition:transform .05s,background .15s}
  .btn-primary:hover{background:var(--navy-2)}.btn-primary:active{transform:translateY(1px)}
  .login-hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);font-size:.82rem;color:var(--faint);line-height:1.7}

  /* ---------------- SHELL ---------------- */
  .shell{display:flex;min-height:100vh}
  aside.sidebar{width:256px;background:var(--sidebar);color:#fff;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;padding:22px 16px;z-index:30}
  .side-brand{display:flex;align-items:center;gap:12px;padding:6px 8px 20px;border-bottom:1px solid var(--sidebar-line)}
  .side-brand .mg{width:40px;height:40px;border:1.5px solid var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-2);font-weight:700;flex:0 0 auto}
  .side-brand .nm{font-family:'Cormorant Garamond',serif;font-size:1.28rem;font-weight:600;line-height:1.1}
  .side-brand .sb{font-size:.68rem;color:var(--sidebar-mut);letter-spacing:.12em;text-transform:uppercase}
  nav.side-nav{margin-top:16px;display:flex;flex-direction:column;gap:4px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;color:var(--sidebar-mut);font-weight:500;font-size:.98rem;transition:background .15s,color .15s;text-align:left;width:100%}
  .nav-item svg{width:20px;height:20px;flex:0 0 auto;stroke-width:1.7}
  .nav-item:hover{background:var(--sidebar-2);color:#e9edf3}
  .nav-item.active{background:var(--sidebar-2);color:#fff;position:relative}
  .nav-item.active::before{content:"";position:absolute;left:-16px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--gold)}
  .side-user{border-top:1px solid var(--sidebar-line);padding-top:14px;margin-top:8px}
  .side-user .u-row{display:flex;align-items:center;gap:11px}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a5823f);color:#1a130a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.98rem;flex:0 0 auto}
  .side-user .nm{font-weight:600;font-size:.92rem;color:#eef1f5;line-height:1.2}
  .side-user .rl{font-size:.74rem;color:var(--sidebar-mut)}
  .btn-signout{margin-top:12px;width:100%;padding:10px;border:1px solid var(--sidebar-line);border-radius:9px;color:var(--sidebar-mut);font-size:.86rem;font-weight:500;transition:.15s;cursor:pointer}
  .btn-signout:hover{background:var(--sidebar-2);color:#fff}

  main.content{margin-left:256px;flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:20}
  .topbar .pg-title{font-size:1.3rem;font-weight:700;letter-spacing:-.01em}
  .topbar .pg-sub{font-size:.84rem;color:var(--muted);margin-top:1px}
  .topbar .clock{text-align:right;font-size:.84rem;color:var(--muted);line-height:1.4}
  .topbar .clock b{color:var(--ink);font-weight:600}
  .page{padding:28px 32px 60px;max-width:1180px;width:100%}

  /* ---------------- COMPONENTS ---------------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:22px}
  .card-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .card-h h2{font-size:1.08rem;font-weight:700;letter-spacing:-.01em}
  .card-h .hint{font-size:.82rem;color:var(--muted)}
  .section-eyebrow{font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px}

  .btn{padding:11px 16px;border-radius:10px;font-weight:600;font-size:.92rem;transition:.15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn svg{width:17px;height:17px;stroke-width:2}
  .btn-dark{background:var(--navy);color:#fff}.btn-dark:hover{background:var(--navy-2)}
  .btn-gold{background:var(--gold);color:#231a08}.btn-gold:hover{background:var(--gold-2)}
  .btn-ghost{background:#f2f3f6;color:var(--ink);border:1px solid var(--line)}.btn-ghost:hover{background:#e9ebf0}
  .btn-danger{background:var(--red-soft);color:var(--red);border:1px solid #eecbc6}.btn-danger:hover{background:#f4dcd8}
  .btn-sm{padding:7px 12px;font-size:.82rem;border-radius:8px}
  .btn-block{width:100%}
  .row{display:flex;gap:12px}.row>*{flex:1}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;position:relative;overflow:hidden}
  .kpi .k{font-size:.76rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .kpi .v{font-size:1.6rem;font-weight:700;margin-top:8px;letter-spacing:-.02em}
  .kpi .u{font-size:.9rem;color:var(--faint);font-weight:500}
  .kpi.pos .v{color:var(--emer)} .kpi.neg .v{color:var(--red)}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px}
  .kpi.pos .bar{background:var(--emer)} .kpi.neg .bar{background:var(--red)} .kpi.gold .bar{background:var(--gold)} .kpi.ink .bar{background:var(--navy)}

  .table{width:100%;border-collapse:collapse}
  .table th{text-align:left;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 12px 10px;border-bottom:1px solid var(--line)}
  .table td{padding:14px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  .table tr:last-child td{border-bottom:none}
  .table tr:hover td{background:#fafbfc}
  .t-title{font-weight:600}
  .t-sub{font-size:.82rem;color:var(--muted)}
  .num{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap;text-align:right}
  .num.pos{color:var(--emer)} .num.neg{color:var(--red)}

  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:.76rem;font-weight:600;line-height:1.5}
  .c-in{background:var(--emer-soft);color:var(--emer)}
  .c-out{background:var(--red-soft);color:var(--red)}
  .c-monthly{background:#eceffb;color:#3b4aa0}
  .c-once{background:#f0f2f5;color:var(--muted)}
  .c-paid{background:var(--emer-soft);color:var(--emer)}
  .c-unpaid{background:var(--amber-soft);color:var(--amber)}
  .c-neutral{background:#eef0f4;color:var(--muted)}
  .c-auto{background:#eef0f4;color:var(--navy)}

  .check{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line-strong);background:#fff;display:inline-flex;align-items:center;justify-content:center;transition:.15s;flex:0 0 auto;cursor:pointer}
  .check svg{width:15px;height:15px;stroke-width:2.5;opacity:0}
  .check.done{background:var(--emer);border-color:var(--emer)}
  .check.done svg{opacity:1;stroke:#fff}
  .check:hover{border-color:var(--emer)}

  .reminder{display:flex;align-items:center;gap:16px;padding:15px 18px;border:1px solid var(--amber-line);background:linear-gradient(90deg,var(--amber-soft),#fff 90%);border-left:3px solid var(--amber);border-radius:11px;margin-bottom:10px}
  .reminder .rm-main{flex:1;min-width:0}
  .reminder .rm-title{font-weight:600}
  .reminder .rm-meta{font-size:.84rem;color:var(--muted)}
  .reminder .rm-when{font-size:.8rem;font-weight:700;color:var(--amber);white-space:nowrap}
  .reminder .rm-when.late{color:var(--red)}

  .empty{text-align:center;color:var(--faint);padding:34px 12px}
  .empty svg{width:36px;height:36px;stroke-width:1.5;opacity:.5;margin-bottom:8px}

  .biz-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .biz-row:last-child{border-bottom:none}

  .seg{display:inline-flex;background:#eef0f4;border-radius:10px;padding:4px;gap:4px;width:100%}
  .seg button{flex:1;padding:10px 14px;border-radius:7px;font-weight:600;color:var(--muted);font-size:.9rem;transition:.15s}
  .seg button.sel{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
  .pchip{background:#f2f3f6;border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:.85rem;font-weight:500;color:var(--ink);transition:.15s}
  .pchip.sel{background:var(--navy);color:#fff;border-color:var(--navy)}

  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .filters>div{flex:1;min-width:140px}

  .modal-bg{position:fixed;inset:0;background:rgba(14,19,27,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60;animation:fade .15s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:92vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .modal-head{padding:22px 24px 0}
  .modal-head h3{font-size:1.25rem;font-weight:700}
  .modal-head p{color:var(--muted);font-size:.88rem;margin:4px 0 0}
  .modal-body{padding:18px 24px}
  .modal-foot{padding:16px 24px 22px;display:flex;gap:12px}
  .modal-foot .btn{flex:1}
  .fld{margin-bottom:14px}
  .field-help{font-size:.8rem;color:var(--faint);margin-top:6px}
  .divider{height:1px;background:var(--line);margin:16px 0}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-weight:500;z-index:80;box-shadow:0 12px 30px rgba(0,0,0,.25);display:flex;align-items:center;gap:9px}
  .toast svg{width:18px;height:18px;stroke:var(--gold-2)}

  .badge-mode{font-size:.74rem;padding:4px 11px;border-radius:999px;font-weight:600}
  .badge-cloud{background:var(--emer-soft);color:var(--emer)}
  .badge-local{background:var(--amber-soft);color:var(--amber)}

  /* charts + docs */
  .legend{display:flex;gap:18px;font-size:.82rem;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
  .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .barchart{display:flex;align-items:flex-end;gap:12px;height:180px;padding-top:6px}
  .barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;min-width:0}
  .barpair{display:flex;gap:4px;align-items:flex-end;height:100%;width:100%;justify-content:center}
  .bar{width:16px;border-radius:5px 5px 0 0;background:var(--navy);min-height:2px;transition:height .3s}
  .bar.exp{background:var(--red)}
  .barlabel{font-size:.72rem;color:var(--muted);white-space:nowrap;text-align:center}
  .updated{font-size:.78rem;color:var(--faint);margin:-8px 0 16px}

  .uploader{border:1.5px dashed var(--line-strong);border-radius:10px;padding:16px;text-align:center;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:500;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .uploader svg{width:18px;height:18px}
  .uploader:hover{border-color:var(--navy);background:var(--navy-soft);color:var(--navy)}
  .filechip{display:inline-flex;align-items:center;gap:8px;background:var(--navy-soft);color:var(--navy);border-radius:8px;padding:8px 12px;font-size:.85rem;font-weight:600;margin-top:8px}
  .filechip svg{width:16px;height:16px;flex:0 0 auto}
  .doc-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .doc-row:last-child{border-bottom:none}
  .doc-ic{width:42px;height:42px;border-radius:10px;background:var(--navy-soft);color:var(--navy);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .doc-ic svg{width:20px;height:20px}
  .rate-badge{background:var(--gold-soft);color:#87641c;border-radius:8px;padding:3px 11px;font-weight:700;font-size:.82rem;white-space:nowrap}
  .link-open{color:var(--navy);font-weight:600;font-size:.85rem;text-decoration:none;white-space:nowrap}
  .link-open:hover{text-decoration:underline}

  /* mobile bottom nav */
  .mobnav{display:none}
  @media(max-width:900px){
    aside.sidebar{display:none}
    main.content{margin-left:0}
    .topbar{padding:14px 18px}
    .page{padding:18px 16px 100px}
    .kpis{grid-template-columns:1fr 1fr;gap:12px}
    #login{grid-template-columns:1fr}
    .login-brand{padding:36px 30px;min-height:auto}
    .login-brand h1{font-size:2.1rem}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:40;box-shadow:0 -2px 14px rgba(0,0,0,.05);overflow-x:auto}
    .mobnav button{flex:1 0 auto;min-width:19%;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;color:var(--muted);font-size:.66rem;font-weight:600}
    .mobnav button svg{width:22px;height:22px;stroke-width:1.8}
    .mobnav button.active{color:var(--navy)}
    .mobnav button.active svg{stroke:var(--gold)}
    .table thead{display:none}
    .table td{display:block;padding:4px 0;border:none}
    .table tr{display:block;padding:14px 0;border-bottom:1px solid var(--line)}
    .num{text-align:left}
    .barchart{height:150px}
  }
  @media(max-width:520px){.kpis{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="login">
  <div class="login-brand">
    <div><div class="monogram serif">F</div></div>
    <div>
      <h1>Finance<br>Console</h1>
      <div class="tag">ระบบบริหารการเงินสำหรับกลุ่มธุรกิจ — อพาร์ทเม้นท์ ซักรีด คลีนนิ่ง และพร็อพเพอร์ตี้</div>
    </div>
    <div class="brand-foot">Private &amp; Confidential</div>
  </div>
  <div class="login-form-wrap">
    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="eyebrow">เข้าสู่ระบบ</div>
      <h2>ยินดีต้อนรับ</h2>
      <p>กรุณากรอกชื่อผู้ใช้และรหัสผ่านของคุณ</p>
      <div id="loginError" class="login-error hidden"></div>
      <div class="field">
        <label>ชื่อผู้ใช้ (Username)</label>
        <input type="text" id="lgUser" placeholder="เช่น owner" autocapitalize="off" autocomplete="username">
      </div>
      <div class="field">
        <label>รหัสผ่าน (Password)</label>
        <input type="password" id="lgPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">เข้าสู่ระบบ</button>
      <div class="login-hint" id="loginHint"></div>
    </form>
  </div>
</div>

<!-- ==================== APP ==================== -->
<div id="app" class="shell hidden">
  <aside class="sidebar">
    <div class="side-brand">
      <div class="mg serif">F</div>
      <div><div class="nm">Finance Console</div><div class="sb">Group Treasury</div></div>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-user">
      <div class="u-row">
        <div class="avatar" id="avatar">–</div>
        <div style="min-width:0"><div class="nm" id="sideName">—</div><div class="rl" id="sideRole">—</div></div>
      </div>
      <button type="button" class="btn-signout" id="signout">ออกจากระบบ</button>
    </div>
  </aside>
  <main class="content">
    <div class="topbar">
      <div><div class="pg-title" id="pgTitle">—</div><div class="pg-sub" id="pgSub">—</div></div>
      <div class="clock" id="clock"></div>
    </div>
    <div class="page" id="page"></div>
  </main>
  <nav class="mobnav" id="mobNav"></nav>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   ตั้งค่าการเชื่อมต่อ Supabase  (แก้แค่ 2 บรรทัดนี้)
   ------------------------------------------------------------
   - ถ้ายังไม่ได้ทำ Supabase ให้ปล่อยว่างไว้ ("")
     แอปจะทำงานแบบทดลอง (เก็บข้อมูลในเครื่องนี้เท่านั้น)

/* ---------- recurring materialization ---------- */
async function materializeRecurring(){
  const items=(await Store.list('recurring_items')).filter(i=>i.active!==false);
  if(!items.length) return;
  const tx=await Store.list('transactions');
  const cur=ymOffset(0), nxt=ymOffset(1);
  for(const it of items){
    const months = it.kind==='expense' ? [cur,nxt] : [cur];
    for(const ym of months){
      const exists=tx.some(t=>t.recurring_id===it.id && (t.txn_date||'').slice(0,7)===ym);
      if(exists) continue;
      const [y,m]=ym.split('-').map(Number);
      const day=Math.min(it.pay_day||1, daysInMonth(y,m));
      const date=`${ym}-${String(day).padStart(2,'0')}`;
      const row={recurring_id:it.id,kind:it.kind,business_id:it.business_id,category:it.category,
        amount:+it.amount||0,wht:+it.wht||0,txn_date:date,recurrence:'monthly',
        is_paid: it.kind==='income'? true : false, paid_date: it.kind==='income'? date : null,
        note:it.note||'', created_by:'auto'};
      const created=await Store.insert('transactions',row); tx.push(created);
    }
  }
}

/* ---------- DASHBOARD (สรุปผู้บริหาร, ดูอย่างเดียว) ---------- */
async function renderDash(p){
  const {bizAll,biz,tx}=await loadScoped();p.innerHTML='';
  const now=new Date();const ym=todayISO().slice(0,7);
  const inMonth=tx.filter(t=>t.txn_date.slice(0,7)===ym);
  const incGross=inMonth.filter(t=>t.kind==='income').reduce((s,t)=>s+ +t.amount,0);
  const wht=inMonth.filter(t=>t.kind==='income').reduce((s,t)=>s+(+t.wht||0),0);
  const incNet=incGross-wht;
  const expense=inMonth.filter(t=>t.kind==='expense').reduce((s,t)=>s+ +t.amount,0);
  const unpaid=tx.filter(t=>t.kind==='expense'&&!t.is_paid).reduce((s,t)=>s+ +t.amount,0);

  p.append(el('div',{class:'updated'},'อัปเดตล่าสุด '+`${now.getDate()} ${TH_M[now.getMonth()]} ${now.getFullYear()+543} เวลา ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} น.`));

  p.append(el('div',{class:'kpis'},
    kpi('pos','รายรับสุทธิ (เดือนนี้)',money(incNet),'฿'),
    kpi('neg','รายจ่าย (เดือนนี้)',money(expense),'฿'),
    kpi(incNet-expense>=0?'ink':'neg','คงเหลือสุทธิ',money(incNet-expense),'฿'),
    kpi('gold','ค้างจ่ายทั้งหมด',money(unpaid),'฿')));

  if(wht>0) p.append(el('div',{class:'card',style:'margin-top:-8px'},el('div',{class:'t-sub'},`รายรับก่อนหัก ${money(incGross)} บาท · หัก ณ ที่จ่ายเดือนนี้ ${money(wht)} บาท`)));

  // reminders
  const due=tx.filter(t=>t.kind==='expense'&&!t.is_paid&&daysUntil(t.txn_date)<=REMIND_DAYS).sort((a,b)=>a.txn_date.localeCompare(b.txn_date));
  const rc=el('div',{class:'card'});
  rc.append(el('div',{class:'card-h'},el('div',{},el('div',{class:'section-eyebrow'},'ต้องดำเนินการ'),el('h2',{},`รายการที่ต้องจ่ายภายใน ${REMIND_DAYS} วัน`)),

function makeUploader(existing){

  const input=el('input',{type:'file',style:'display:none',accept:'.pdf,.jpg,.jpeg,.png,.webp'});

  function draw(){box.innerHTML='';box.append(el('div',{class:'uploader',html:svg(I.upload)+'<span>คลิกเพื่อเลือกไฟล์ (PDF/รูปภาพ ไม่เกิน 4MB)</span>',onclick:()=>input.click()}));

  input.addEventListener('change',async()=>{const f=input.files[0];if(!f)return;if(f.size>MAX_FILE){toast('ไฟล์ใหญ่เกิน 4MB');input.value='';return;}state={file_name:f.name,file_data:await readFile(f)};draw();});
  draw();

}
